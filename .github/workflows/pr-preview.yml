name: PR Open Deploy

# 触发条件：PR创建/更新/重新打开时
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-open:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      - name: 动态修改base路径（适配PR预览子目录）
        run: |
          # 针对Vite项目，动态修改vite.config.ts的base
          PR_NUMBER=${{ github.event.number }}
          sed -i "s|base:.*|base: '/OSQuestTemplate/preview/pr${PR_NUMBER}/',|" vite.config.ts
          # 验证修改是否生效
          cat vite.config.ts

      - name: 项目构建
        run: npm run build

      - name: 推送构建产物到 pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: pages    # 推送到这个新分支
          publish_dir: ./dist    # 你的构建输出目录（改这里！）
          github_token: ${{ secrets.PAT }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 评论预览链接到PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ✅ PR #${{ github.event.number }} 预览已生成！
            🔗 预览地址：https://flyfastcode.github.io/ShipDesign33/pr${{ github.event.number }}/
            📦 构建分支：pages/pr${{ github.event.number }}
            ⚠️  仅用于测试，请勿直接访问正式环境
          GITHUB_TOKEN: ${{ secrets.PAT }}
